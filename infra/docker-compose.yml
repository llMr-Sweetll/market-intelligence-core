services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      GM_HOST: 0.0.0.0
      GM_PORT: 8000
      DATABASE_URL: postgres://${POSTGRES_USER:-gm}:${POSTGRES_PASSWORD:-gm}@postgres:5432/${POSTGRES_DB:-gm}
      GM_MIGRATIONS: /app/migrations
      WEB_ASSETS_DIR: /app/web
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gm}
      POSTGRES_DB: ${POSTGRES_DB:-gm}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gm -d gm"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
